<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
{% include '_theme_script.html' %}
</head>
<body>
<div class="container py-4" style="max-width: 520px;">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Reset Password</h4>
    <a href="{{ url_for('login') }}" class="btn btn-sm btn-outline-secondary">Back to Login</a>
  </div>
  <div class="card">
    <div class="card-body">
      {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}
      {% if success %}
      <div class="alert alert-success py-2">{{ success }}</div>
      {% endif %}
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label" for="new_password">New password</label>
          <input class="form-control" id="new_password" name="new_password" type="password" minlength="8" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="confirm_password">Confirm new password</label>
          <input class="form-control" id="confirm_password" name="confirm_password" type="password" minlength="8" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Reset Password</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
