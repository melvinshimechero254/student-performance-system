<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
{% include '_theme_script.html' %}
</head>
<body>
<div class="container py-4" style="max-width: 520px;">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Forgot Password</h4>
    <a href="{{ url_for('login') }}" class="btn btn-sm btn-outline-secondary">Back to Login</a>
  </div>
  <div class="card">
    <div class="card-body">
      {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}
      {% if success %}
      <div class="alert alert-info py-2">{{ success }}</div>
      {% endif %}
      {% if reset_url %}
      <div class="alert alert-warning py-2">Reset link (test/demo): <a href="{{ reset_url }}">{{ reset_url }}</a></div>
      {% endif %}
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label" for="identifier">Username or email</label>
          <input class="form-control" id="identifier" name="identifier" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Send Reset Instructions</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
