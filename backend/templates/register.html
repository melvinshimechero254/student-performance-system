<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register — Student Performance Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
{% include '_theme_script.html' %}
  <style>
    [data-bs-theme="light"] body { background: #eef2f7; }
    header { background: #1e293b; color: white; padding: 15px; text-align: center; }
    .auth-card { max-width: 420px; margin: 2rem auto; }
  </style>
</head>
<body>
<header>
  <h3 class="mb-0">Student Performance Dashboard</h3>
</header>
<div class="container py-4">
  <div class="card shadow-sm auth-card">
    <div class="card-body p-4">
      <h5 class="card-title mb-3">Create account</h5>
      {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}
      <form method="post" action="{{ url_for('register') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label" for="username">Username</label>
          <input class="form-control" id="username" name="username" autocomplete="username" required
                 pattern="[a-zA-Z0-9_]{3,32}" title="3–32 characters: letters, numbers, underscore">
        </div>
        <div class="mb-3">
          <label class="form-label" for="email">Email</label>
          <input class="form-control" id="email" name="email" type="email" autocomplete="email" required>
          <div class="form-text">Used for password reset and email-based login.</div>
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" id="password" name="password" type="password" autocomplete="new-password" required
                 minlength="8">
          <div class="form-text">At least 8 characters.</div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Register</button>
      </form>
      <p class="mt-3 mb-0 text-center small text-secondary">
        Already have an account? <a href="{{ url_for('login') }}">Log in</a>
      </p>
    </div>
  </div>
</div>
</body>
</html>
